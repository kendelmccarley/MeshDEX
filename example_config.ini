# MeshDEX configuration
# Copy this file to config.ini and edit as needed.

##########################
#### Autostart App    ####
##########################
# Optionally launch an app automatically in the main terminal tab on startup.
# command  = the shell command to run
# tab_name = label shown on the tab (optional)
#
# Examples:
#
# MeshTTY:
# [autostart]
# command = bash ~/MeshTTY/launch-pi.sh
# tab_name = MESHTTY
#
# TC2-BBS:
# [autostart]
# command = bash ~/TC2-BBS-mesh/launch-bbs.sh
# tab_name = TC2-BBS
#
# Leave this section commented out (or omit config.ini) for no autostart.
